<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Detalle de evento - DIEX Eventos Colombia"
    />
    <title>Evento - DIEX Eventos</title>

    <!-- Fuentes y estilos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .skip-link {
        position: absolute;
        top: -9999px;
        left: var(--space-4);
        background: var(--color-molten-orange);
        color: #fff;
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius-md);
        z-index: 9999;
        font-weight: 600;
      }
      .skip-link:focus {
        top: var(--space-4);
      }
    </style>
  </head>
  <body>
    <!-- Navbar inyectado -->
    <div id="navbar-placeholder"></div>

    <main id="main-content" class="pt-20">
      <!-- HERO EVENTO -->
      <section
        class="event-detail-hero"
        id="event-hero"
        aria-label="Imagen principal del evento"
      >
        <img
          src=""
          alt=""
          class="event-detail-hero__img"
          id="hero-img"
          loading="eager"
          width="1280"
          height="720"
        />
        <div class="event-detail-hero__overlay" aria-hidden="true"></div>
        <div class="event-detail-hero__body">
          <div class="container">
            <a href="portafolio.html" class="event-detail-back">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
              </svg>
              <span>Volver al portafolio</span>
            </a>
            <div id="hero-content" class="scroll-anim">
              <span class="event-detail-cat" id="hero-cat"></span>
              <h1
                class="section-heading"
                id="hero-title"
                style="margin-bottom: var(--space-4)"
              ></h1>
              <div class="event-detail-meta" id="hero-meta"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- CONTENIDO DETALLE -->
      <section class="py-16" aria-label="Detalle del proyecto">
        <div class="container">
          <div class="event-detail-grid">
            <!-- Columna principal -->
            <div class="event-detail-main">
              <!-- Descripción -->
              <div class="scroll-reveal" id="block-desc">
                <h2
                  class="section-heading"
                  style="font-size: 1.5rem; margin-bottom: var(--space-4)"
                >
                  Descripción del Proyecto
                </h2>
                <p class="event-detail-block__text" id="event-desc"></p>
              </div>

              <!-- Reto -->
              <div
                class="event-detail-block scroll-reveal"
                id="block-challenge"
              >
                <h3 class="event-detail-block__title">Reto</h3>
                <p class="event-detail-block__text" id="event-challenge"></p>
              </div>

              <!-- Solución -->
              <div
                class="event-detail-block event-detail-block--primary scroll-reveal"
                id="block-solution"
              >
                <h3 class="event-detail-block__title">Solución</h3>
                <p class="event-detail-block__text" id="event-solution"></p>
              </div>

              <!-- Galería -->
              <div class="scroll-reveal" id="block-gallery">
                <h3
                  class="section-heading"
                  style="font-size: 1.5rem; margin-bottom: var(--space-6)"
                >
                  Galería del Evento
                </h3>
                <div class="event-gallery" id="event-gallery"></div>
              </div>
            </div>

            <!-- Sidebar -->
            <aside
              class="event-sidebar"
              id="event-sidebar"
              aria-label="Resultados y contacto"
            >
              <!-- Resultados -->
              <div class="event-detail-block scroll-reveal" id="block-results">
                <h3 class="event-detail-block__title">Resultados</h3>
                <ul class="results-list" id="results-list" role="list"></ul>
              </div>

              <!-- CTA sidebar -->
              <div class="sidebar-cta scroll-reveal" id="block-cta">
                <h4 class="sidebar-cta__title">¿Te inspiró este proyecto?</h4>
                <p class="sidebar-cta__text">
                  Conversemos sobre cómo podemos crear una experiencia similar
                  para tu marca.
                </p>
                <a href="contacto.html" class="btn btn--white btn--md btn--full"
                  >Cotizar Mi Evento</a
                >
              </div>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer inyectado -->
    <div id="footer-placeholder"></div>

    <!-- Scripts globales -->
    <script src="js/events-data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <!-- Script específico de detalle de evento -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const { initScrollAnimation, initScrollReveal } = window.DiexAnimations;

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const event =
          Array.isArray(window.DIEX_EVENTS) &&
          window.DIEX_EVENTS.find((e) => e.id === id);

        if (!event) {
          window.location.replace("eventos.html");
          return;
        }

        // Título de la pestaña
        document.title = event.title + " - DIEX Eventos";

        // Hero
        const heroImg = document.getElementById("hero-img");
        heroImg.src = event.image;
        heroImg.alt = event.title;

        document.getElementById("hero-cat").textContent = event.category;
        document.getElementById("hero-title").textContent = event.title;
        document.getElementById("hero-meta").innerHTML = `
          <span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${event.location}
          </span>
          <span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            ${event.year}
          </span>
        `;

        // Contenidos
        document.getElementById("event-desc").textContent = event.description;
        document.getElementById("event-challenge").textContent =
          event.challenge;
        document.getElementById("event-solution").textContent = event.solution;

        // Galería
        const gallery = document.getElementById("event-gallery");
        gallery.innerHTML = event.gallery
          .map(
            (img, i) => `
            <div class="event-gallery__item">
              <img
                src="${img}"
                alt="${event.title} - Imagen ${i + 1}"
                loading="lazy"
                width="800"
                height="256"
              />
            </div>
          `,
          )
          .join("");

        // Resultados
        const resultsList = document.getElementById("results-list");
        resultsList.innerHTML = event.results
          .map(
            (r) => `
            <li class="results-list__item" role="listitem">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              <span>${r}</span>
            </li>
          `,
          )
          .join("");

        // Animaciones
        initScrollAnimation(document.getElementById("hero-content"), {
          zoomIntensity: 0.05,
          threshold: 0.1,
          enableFade: false,
        });

        [
          "block-desc",
          "block-challenge",
          "block-solution",
          "block-gallery",
          "block-results",
          "block-cta",
        ].forEach((id, i) => {
          const el = document.getElementById(id);
          if (el) initScrollReveal(el, i * 100);
        });

        // ----------------------------------------------------
        // Forzar activo en Portafolio (desktop + mobile)
        // ----------------------------------------------------
        const navbarInterval = setInterval(() => {
          const navbar = document.querySelector("#navbar-placeholder .navbar");
          if (!navbar) return;

          clearInterval(navbarInterval);

          // Desktop links
          const desktopLinks = navbar.querySelectorAll(".navbar-link");
          desktopLinks.forEach((link) => {
            const href = link.getAttribute("href");
            link.classList.remove("navbar-link--active");

            if (href && href.includes("portafolio.html")) {
              link.classList.add("navbar-link--active");
            }
          });

          // Mobile submenu links (si aplica)
          const mobileLinks = navbar.querySelectorAll(
            ".navbar-mobile-submenu__link",
          );
          mobileLinks.forEach((link) => {
            const href = link.getAttribute("href");
            link.classList.remove("navbar-mobile-submenu__link--active");

            if (href && href.includes("portafolio.html")) {
              link.classList.add("navbar-mobile-submenu__link--active");
            }
          });
        }, 50);
      });
    </script>
  </body>
</html>
